name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Commit package-lock.json if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json || true
          git commit -m "chore: auto-generate package-lock.json" || true
          git push origin HEAD || true

      - name: Run automated tests and generate report
        run: npm run test:report

      - name: Build application
        run: npm run build

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: test-and-build-artifacts
          path: |
            reports
            dist
