name: Deploy To EC2

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  DEPLOY_BUCKET: stitch-react-app-deploy-688138570083-us-east-1
  EC2_INSTANCE_ID: i-004ea80872fabc5d0
  AWS_ROLE_ARN: arn:aws:iam::688138570083:role/stitch-react-app-github-actions-deploy-role

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package site artifact
        run: |
          mkdir -p bundle
          tar -C dist -czf bundle/site.tar.gz .
          echo "DEPLOY_KEY=deployments/${{ github.event.workflow_run.head_sha }}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact to S3
        run: aws s3 cp bundle/site.tar.gz "s3://${DEPLOY_BUCKET}/${DEPLOY_KEY}"

      - name: Deploy artifact to EC2 via SSM
        run: |
          cat > /tmp/commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "mkdir -p /tmp/stitch-react-app-deploy",
              "aws s3 cp s3://${DEPLOY_BUCKET}/${DEPLOY_KEY} /tmp/stitch-react-app-deploy/site.tar.gz",
              "sudo rm -rf /usr/share/nginx/html/*",
              "sudo tar -xzf /tmp/stitch-react-app-deploy/site.tar.gz -C /usr/share/nginx/html",
              "sudo chown -R nginx:nginx /usr/share/nginx/html",
              "sudo systemctl restart nginx"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy stitch-react-app from GitHub Actions" \
            --parameters file:///tmp/commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_ENV"

      - name: Wait for deployment command
        run: |
          for attempt in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || true)

            echo "attempt=${attempt} status=${STATUS}"

            if [ "${STATUS}" = "Success" ]; then
              exit 0
            fi

            if [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ] || [ "${STATUS}" = "Failed" ]; then
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${EC2_INSTANCE_ID}" \
                --output json
              exit 1
            fi

            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --output json
          exit 1

      - name: Verify deployment endpoint
        run: curl --fail --silent --show-error http://3.87.57.95 > /dev/null
